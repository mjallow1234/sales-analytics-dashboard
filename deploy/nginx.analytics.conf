server {
    listen 80;
    listen [::]:80;
    server_name analytics.sidrahsalaam.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name analytics.sidrahsalaam.com;

    add_header Content-Security-Policy "upgrade-insecure-requests";

    root /home/deploy/apps/sales-analytics-dashboard/frontend;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/analytics.sidrahsalaam.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/analytics.sidrahsalaam.com/privkey.pem;

    location /health {
        proxy_pass http://127.0.0.1:3000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /analytics {
        proxy_pass http://127.0.0.1:3000/analytics;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
